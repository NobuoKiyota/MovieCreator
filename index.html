<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieCreator - Generative Video Generator</title>
  <link rel="stylesheet" href="/src/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="header-logo">
        <span class="logo-icon">✦</span>
        <h1>MovieCreator</h1>
      </div>

      <!-- 再生/録画・プロジェクトコントローラーを一列に統合 -->
      <div class="transport-controls">
        <div id="layer-status-badge" class="layer-status-badge" style="display: none;" title="">
          <span id="layer-status-type" class="layer-status-type"></span>
          <span id="layer-status-counts" class="layer-status-counts"></span>
        </div>

        <button id="btn-rewind-start" class="btn btn-secondary btn-header-icon" title="Return to start (Numpad .)">
          ⏮
        </button>

        <button id="btn-play-pause" class="btn btn-primary">
          <span class="btn-icon">▶</span> <span class="btn-text">Play</span>
        </button>

        <button id="btn-timecode-toggle" class="btn btn-secondary btn-tc" title="Toggle Timecode Overlay on Preview" aria-pressed="false">
          T.C
        </button>
        
        <div class="controls-divider"></div>
        
        <div class="control-group inline">
          <label for="export-duration">Dur</label>
          <div class="input-with-unit">
            <input type="number" id="export-duration" value="10" min="1" max="120" step="1">
            <span class="unit">s</span>
          </div>
        </div>
        
        <div class="control-group inline">
          <label for="export-bg">BG</label>
          <select id="export-bg">
            <option value="transparent">Transparent (WebM)</option>
            <option value="black" selected>Black (MP4)</option>
            <option value="green">Green Screen (MP4)</option>
            <option value="white">White (MP4)</option>
          </select>
        </div>

        <div class="control-group inline" title="Also export a ProRes 4444 MOV via local ffmpeg (Transparent WebM only)">
          <label for="export-prores" style="cursor: pointer;">P4444</label>
          <input type="checkbox" id="export-prores" style="width: 16px; height: 16px; cursor: pointer;">
        </div>

        <div class="control-group inline">
          <label for="export-resolution">Res</label>
          <select id="export-resolution">
            <option value="720p">720p (1280x720)</option>
            <option value="1080p" selected>1080p (1920x1080)</option>
            <option value="4K">4K (3840x2160)</option>
          </select>
        </div>

        <div class="control-group inline">
          <label for="export-fps">FPS</label>
          <select id="export-fps">
            <option value="30">30 fps</option>
            <option value="60" selected>60 fps</option>
          </select>
        </div>

        <div class="control-group inline">
          <label for="master-fade-out">Fade</label>
          <div class="input-with-unit">
            <input type="number" id="master-fade-out" value="0" min="0" max="10" step="0.1">
            <span class="unit">s</span>
          </div>
        </div>

        <button id="btn-export" class="btn btn-accent" title="Export Video">
          <span class="btn-icon">🎬</span> Export
        </button>

        <div class="controls-divider"></div>

        <div class="select-wrapper">
          <select id="project-select" title="Projects" style="width: 100px; font-size: 0.8rem; height: 32px; text-overflow: ellipsis; white-space: nowrap; overflow: hidden;">
            <option value="">-- Project --</option>
          </select>
        </div>
        <button id="btn-api-load-project" class="btn btn-secondary btn-small btn-header-icon" title="Load selected project from projects/ directory">📂</button>
        <button id="btn-api-save-project-quick" class="btn btn-secondary btn-small btn-header-icon" title="Quick save current project config">💾</button>
        <button id="btn-api-save-project" class="btn btn-secondary btn-small btn-header-icon" title="Save current project config to projects/ directory as a new file">💾+</button>
        <button id="btn-project-new" class="btn btn-secondary btn-small btn-header-icon" title="Create a new empty project">📄</button>
        <div class="controls-divider"></div>
        <button id="btn-local-export-project" class="btn btn-secondary btn-small btn-header-icon" title="Export project to local file (.mvproj)">⬇</button>
        <button id="btn-local-import-project" class="btn btn-secondary btn-small btn-header-icon" title="Import project from local file (.mvproj)">⬆</button>
        <input type="file" id="input-local-import-project" accept=".mvproj" style="display: none;">
      </div>
    </header>
    
    <main class="app-body">
      <!-- プレビュー＆エクスポートエリア -->
      <section class="preview-section">
        <div class="canvas-wrapper">
          <div class="canvas-container">
            <canvas id="preview-canvas" width="1280" height="720"></canvas>
            <div id="recording-overlay" class="recording-overlay hidden">
              <div class="glass-panel">
                <div class="spinner"></div>
                <span id="recording-status">Rendering: 0%</span>
                <progress id="recording-progress" value="0" max="100"></progress>
              </div>
            </div>
          </div>
        </div>
        
        <!-- Timeline & Keyframe Panel -->
        <div id="timeline-panel" class="timeline-panel">
          <div class="timeline-header">
            <div class="timeline-info">
              <span class="timeline-title">🔑 KEYFRAME TIMELINE</span>
              <span id="timeline-active-param" class="timeline-active-param">Select a parameter to animate</span>
            </div>
            <div class="timeline-keyframe-editor" style="gap: 0.3rem;">
              <label for="key-precise-frame" style="font-size: 0.65rem;">F:</label>
              <input type="number" id="key-precise-frame" min="0" step="1" disabled style="width: 32px !important; padding: 0.1rem 0.2rem !important; font-size: 0.65rem !important;">
              <label for="key-precise-value" style="font-size: 0.65rem;">V:</label>
              <input type="number" id="key-precise-value" step="0.001" disabled style="width: 48px !important; padding: 0.1rem 0.2rem !important; font-size: 0.65rem !important;">
              
              <label for="key-precise-easing" style="font-size: 0.65rem;">Ease:</label>
              <select id="key-precise-easing" disabled style="background: rgba(15, 15, 26, 0.9); border: 1px solid rgba(124, 58, 237, 0.4); color: #e2e8f0; font-size: 0.65rem; border-radius: 4px; padding: 0.1rem 0.2rem; outline: none; height: 20px;">
                <option value="linear">Linear</option>
                <option value="ease-in">Ease In</option>
                <option value="ease-out">Ease Out</option>
                <option value="ease-in-out">Ease In-Out</option>
                <option value="step">Step</option>
              </select>
              
              <button id="btn-key-precise-delete" class="btn btn-secondary btn-small" disabled style="padding: 0.12rem 0.35rem; font-size: 0.65rem; cursor: pointer;">Del</button>
              
              <div class="controls-divider" style="height: 18px; margin: 0 2px;"></div>
              
              <button id="btn-key-clear-all" class="btn btn-secondary btn-small" disabled style="padding: 0.12rem 0.35rem; font-size: 0.65rem; cursor: pointer;">Clear</button>
              <button id="btn-key-copy" class="btn btn-secondary btn-small" disabled style="padding: 0.12rem 0.35rem; font-size: 0.65rem; cursor: pointer;">Copy</button>
              <button id="btn-key-paste" class="btn btn-secondary btn-small" disabled style="padding: 0.12rem 0.35rem; font-size: 0.65rem; cursor: pointer;">Paste</button>
              
              <div class="controls-divider" style="height: 18px; margin: 0 2px;"></div>

              <select id="timeline-template-select" disabled style="background: rgba(15, 15, 26, 0.9); border: 1px solid rgba(124, 58, 237, 0.4); color: #e2e8f0; font-size: 0.65rem; border-radius: 4px; padding: 0.1rem 0.2rem; outline: none; height: 20px; width: 85px; cursor: pointer;">
                <option value="">Template</option>
              </select>
              <button id="btn-key-save-template" class="btn btn-secondary btn-small" disabled style="padding: 0.12rem 0.35rem; font-size: 0.65rem; cursor: pointer;" title="Save current keyframes as a new template">Save</button>
              <button id="btn-template-export" class="btn btn-secondary btn-small" style="padding: 0.12rem 0.35rem; font-size: 0.65rem; cursor: pointer;" title="Export custom templates to JSON file">Exp</button>
              <button id="btn-template-import" class="btn btn-secondary btn-small" style="padding: 0.12rem 0.35rem; font-size: 0.65rem; cursor: pointer;" title="Import custom templates from JSON file">Imp</button>
              <input type="file" id="template-import-file" style="display: none;" accept=".json">

              <div class="controls-divider" style="height: 18px; margin: 0 2px;"></div>
              
              <select id="timeline-snap-select" disabled title="Snap keyframes to a frame grid (horizontal axis)" style="background: rgba(15, 15, 26, 0.9); border: 1px solid rgba(124, 58, 237, 0.4); color: #e2e8f0; font-size: 0.65rem; border-radius: 4px; padding: 0.1rem 0.2rem; outline: none; height: 20px; width: 80px;">
                <option value="off">Snap: Off</option>
                <option value="1">Snap: 1f</option>
                <option value="5">Snap: 5f</option>
                <option value="10">Snap: 10f</option>
                <option value="15">Snap: 15f</option>
                <option value="30">Snap: 30f</option>
                <option value="60">Snap: 60f</option>
              </select>
              <select id="timeline-snap-value-select" disabled title="Snap keyframe values to a percent-of-range grid (vertical axis)" style="background: rgba(15, 15, 26, 0.9); border: 1px solid rgba(124, 58, 237, 0.4); color: #e2e8f0; font-size: 0.65rem; border-radius: 4px; padding: 0.1rem 0.2rem; outline: none; height: 20px; width: 80px;">
                <option value="off">V-Snap: Off</option>
                <option value="2">V-Snap: 2%</option>
                <option value="5">V-Snap: 5%</option>
                <option value="10">V-Snap: 10%</option>
                <option value="20">V-Snap: 20%</option>
                <option value="25">V-Snap: 25%</option>
                <option value="50">V-Snap: 50%</option>
              </select>
            </div>
          </div>
          <div class="timeline-body">
            <canvas id="timeline-canvas"></canvas>
          </div>
        </div>
      </section>

      <!-- パラメータ＆レイヤーパネル (インスペクター構造) -->
      <section class="panel-section">
        <!-- 上半分: レイヤーヒエラルキー -->
        <div class="layers-manager-container">
          <div class="panel-header">
            <h2>Layers</h2>
            <div class="layer-actions" style="display: flex; gap: 0.4rem; align-items: center;">
              <button id="btn-add-layer" class="btn btn-secondary" style="padding: 0.3rem 0.5rem; font-size: 0.75rem;">+ Add</button>
              <div class="select-wrapper">
                <select id="preset-select" style="min-width: 100px; font-size: 0.75rem; height: 26px; padding: 0.15rem 1.25rem 0.15rem 0.4rem;">
                  <option value="">-- Import Preset --</option>
                </select>
              </div>
              <button id="btn-api-import-layer" class="btn btn-secondary btn-small" title="Import selected layer preset from presets/ directory" style="font-size: 0.75rem; padding: 0.2rem 0.4rem; height: 26px;">Import</button>

              
              <div id="layer-selector-container" class="layer-selector-popup hidden">
                <div class="select-wrapper">
                  <select id="layer-type-select">
                    <option value="sine-wave">Sine Wave (波線)</option>
                    <option value="noise-wave">Noise Wave (ノイズ波)</option>
                    <option value="particles">Firefly Particles (ホタル)</option>
                    <option value="geometry">Lissajous Geometry (幾何学模様)</option>
                    <option value="growing-sketch">Growing Sketch (成長する線)</option>
                    <option value="rain">Neon Rain (雨)</option>
                    <option value="meteor">Meteor Shower (流星)</option>
                    <option value="ripple">Pulse Ripples (波紋)</option>
                    <option value="spectrum">Audio Spectrum (スペクトル)</option>
                    <option value="cube-3d">3D Glowing Cube (3D回転キューブ)</option>
                    <option value="lightning">Neon Lightning (稲妻)</option>
                    <option value="fog">Neon Fog (フォグ)</option>
                    <option value="flame">Cyber Flame (炎)</option>
                    <option value="snowflake">Neon Snowflake (雪の結晶)</option>
                    <option value="spirograph">Neon Spirograph (スピログラフ)</option>
                    <option value="aurora">Aurora Curtain (オーロラ)</option>
                    <option value="dry-ice">Dry Ice Smoke (ドライアイスの煙)</option>
                    <option value="shape-3d-particles">3D Shape Particles (3D形状パーティクル)</option>
                    <option value="lighthouse">Lighthouse Beacon (回転灯台)</option>
                    <option value="shockwave-burst">Shockwave Burst (衝撃波)</option>
                    <option value="glass-crack">Glass Crack (ガラスのひび割れ)</option>
                    <option value="dot-design">Dot Design (ドットデザイン)</option>
                    <option value="noise-glitch">Noise Glitch (ノイズグリッチ)</option>
                    <option value="milky-way">Milky Way (天の川)</option>
                    <option value="color-wash">Color Wash (全体色調変更)</option>
                  </select>
                </div>
                <button id="btn-confirm-add-layer" class="btn btn-small btn-primary">Add</button>
              </div>
            </div>
          </div>
          <div id="layers-list" class="layers-simple-list">
            <!-- 簡素なレイヤー行が動的に生成される -->
          </div>
        </div>

        <!-- 下半分: パラメータインスペクター -->
        <div class="inspector-container">
          <div class="inspector-header">
            <h2>Inspector</h2>
            <div style="display: flex; align-items: center; gap: 0.4rem;">
              <input type="text" id="inspector-layer-name" value="No Layer Selected">
              <button id="btn-detach-inspector" class="btn btn-secondary btn-small" title="Detach Inspector to float window" style="font-size: 0.75rem; padding: 0.2rem 0.4rem; height: 26px;">↗️ Float</button>
              <button id="btn-api-export-layer-inspector" class="btn btn-secondary btn-small btn-api-export-layer" title="Save Selected Layer Preset to presets/ directory" style="font-size: 0.75rem; padding: 0.2rem 0.4rem; height: 26px; line-height: 1;">💾 Save</button>
            </div>
          </div>
          <div id="inspector-content" class="inspector-content">
            <!-- 選択されたアクティブレイヤーの全スライダー・LFOが動的に生成される -->
          </div>
        </div>
      </section>
    </main>
  </div>
  
  <script type="module" src="/src/main.js"></script>
</body>
</html>
